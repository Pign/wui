<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>wui — Haxe to WinUI 3</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="description" content="Write native WinUI 3 Windows apps in Haxe">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    :root {
      --theme-color: #0078d4;
    }
    .sidebar-nav li a {
      font-size: 14px;
    }
    .cover-main {
      background: linear-gradient(135deg, #0078d4 0%, #005a9e 100%) !important;
    }
    .cover-main .anchor span {
      color: #fff;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'wui',
      repo: '',
      loadSidebar: true,
      coverpage: true,
      auto2top: true,
      subMaxLevel: 3,
      search: {
        paths: 'auto',
        placeholder: 'Search docs...',
        noData: 'No results',
        depth: 4
      },
      copyCode: {
        buttonText: 'Copy',
        successText: 'Copied'
      },
      pagination: {
        previousText: 'Previous',
        nextText: 'Next',
        crossChapter: true
      },
      markdown: {
        renderer: {
          code: function(code, lang) {
            if (lang === 'mermaid') {
              return '<div class="mermaid">' + code + '</div>';
            }
            return this.origin.code.apply(this, arguments);
          }
        }
      }
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <script>
    mermaid.initialize({ startOnLoad: false, theme: 'default' });
    // Re-render mermaid diagrams after docsify page load
    var defined = false;
    function renderMermaid() {
      document.querySelectorAll('.mermaid').forEach(function(el) {
        el.removeAttribute('data-processed');
      });
      mermaid.run({ querySelector: '.mermaid' });
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script>
    // Re-render mermaid diagrams on each docsify page change
    window.$docsify.plugins = (window.$docsify.plugins || []).concat(function(hook) {
      hook.doneEach(function() { renderMermaid(); });
    });
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code@2"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-pagination@2/dist/docsify-pagination.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-haxe.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-cpp.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-xml-doc.min.js"></script>
</body>
</html>
